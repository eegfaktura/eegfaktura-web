# Ersetzt die seit Mai 2026 4x rote rolling-release.yml.
#
# Build-Flow:
#   1. setup-pnpm + setup-node (nvmrc)
#   2. pnpm install --no-frozen-lockfile (pnpm-lock.yaml ist out-of-sync,
#      GH Actions setzt CI=true -> pnpm install defaultet zu --frozen-lockfile)
#   3. pnpm run build (tsc && vite build -> dist/)
#   4. Dummy keycloak-config.json (Cluster mountet ConfigMap zur Laufzeit drueber,
#      Dockerfile erwartet die Datei aber zur Build-Zeit via ADD)
#   5. docker/build-push-action -> ghcr.io/eegfaktura/eegfaktura-web
#   6. Build-Provenance-Attestation
#
# ⚠️ STUFE 1: KEIN repository_dispatch-Job. Erstmal nur sicherstellen, dass
# der Source-Code auf einer CI-Maschine durchbaut. Wenn 1-2 push-builds gruen
# sind und das Image im Cluster manuell getestet wurde, wird der
# dispatch-deploy-Job in einer zweiten Iteration ergaenzt (Stufe 3).
#
# Vorbedingung Stufe 1: keine (GITHUB_TOKEN reicht aus, kein PLATFORM_DEPLOY_PAT).
# Vorbedingung Stufe 3: `PLATFORM_DEPLOY_PAT`-Secret im Repo + dispatch-deploy
# job in dieser Datei.

name: Docker Image CI

on:
  push:
    branches:
      - master
      - main
    tags:
      - v*
  pull_request:
    branches:
      - master
      - main

env:
  REGISTRY: "ghcr.io"
  IMAGE_NAME: "eegfaktura/eegfaktura-web"

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.1
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        # --no-frozen-lockfile: pnpm-lock.yaml ist im Source-Repo out-of-sync
        # mit package.json. GH Actions setzt CI=true, pnpm install defaultet
        # damit zu --frozen-lockfile und failt sofort. Long-term-Fix waere
        # `pnpm install` lokal + commit pnpm-lock.yaml.
        run: pnpm install --no-frozen-lockfile

      - name: Build SPA (pnpm run build -> ./dist)
        run: pnpm run build

      - name: Stub keycloak-config.json for Docker build context
        run: |
          # Dockerfile macht `ADD keycloak-config.json /srv`. Im Cluster wird
          # die Datei per ConfigMap-Mount (eegfaktura-web-keycloak) ueber-
          # schrieben, deshalb reicht eine leere JSON.
          echo '{}' > keycloak-config.json

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,format=short,prefix=sha-
          labels: |
            org.opencontainers.image.title="eegfaktura-web"
            org.opencontainers.image.description="EEG Faktura web frontend (Customer)"
            org.opencontainers.image.source=${{ github.event.repository.html_url || '' }}
            org.opencontainers.image.url=${{ github.event.repository.html_url || '' }}
            org.opencontainers.image.version=${{ github.sha || '' }}
            org.opencontainers.image.revision=${{ github.sha || '' }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp || '' }}
            org.opencontainers.image.authors="eegfaktura@vfeeg.org"
            org.opencontainers.image.vendor="Verein zur Förderung von Erneuerbaren Energiegemeinschaften"
            org.opencontainers.image.licenses=${{ github.event.repository.license.spdx_id || '' }}
            org.opencontainers.image.ref.name=${{ github.ref || '' }}
            org.opencontainers.image.ref.sha=${{ github.sha || '' }}
            org.opencontainers.image.repository=${{ github.repository || '' }}

      - name: Login to Container Registry
        # PR-Builds duerfen nicht pushen — Login nur bei push.
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build (PR) / Build and push (push)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags || 'latest' }}
          labels: ${{ steps.meta.outputs.labels || '' }}
          annotations: ${{ steps.meta.outputs.annotations }}

      - name: Generate artifact attestation
        if: github.event_name == 'push'
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # NOTE — Stufe 3: hier kommt ein zweiter Job `dispatch-deploy` rein,
  # analog zu eegfaktura-filestore-rolling-release.yml.
  # Erst aktivieren, wenn:
  #   - Build oben mindestens 1x erfolgreich auf push-to-default-branch
  #   - K8s-Manifest k8s/40-web.yaml im Platform-Repo umgestellt + getestet
  #   - Platform-Workflow deploy-on-dispatch.yml akzeptiert `deploy-web`
  #   - `PLATFORM_DEPLOY_PAT`-Secret im Source-Repo gesetzt
